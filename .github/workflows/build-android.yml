name: Build AKATSUKI Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform + build tools
        run: sdkmanager --install "platforms;android-35" "build-tools;35.0.0"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version=8.9 --distribution-type=bin

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: akatsuki-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error
